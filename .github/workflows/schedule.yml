name: Daily WA Wakaf & Sedekah Blast

on:
  schedule:
    - cron: '0 22 * * *'  # 6:00 AM Malaysia (UTC+8 = 22:00 UTC sehari sebelum)
  workflow_dispatch:  # Boleh trigger manual jugak

jobs:
  blast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run blast script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WABOT_ACCESS_TOKEN: ${{ secrets.WABOT_ACCESS_TOKEN }}
          WABOT_INSTANCE_ID: ${{ secrets.WABOT_INSTANCE_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python blast.py
